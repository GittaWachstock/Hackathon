version: '3.9'

services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sampledb

    ports:
      - "5432:5432"

    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .

    depends_on:
      - postgres

    ports:
      - "8000:8000"

    environment:
      OPENAI_API_KEY: sk-xxxxx

    volumes:
      - .:/app