version: '3.9'

services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sampledb

    ports:
      - "5432:5432"

    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .

    depends_on:
      - postgres

    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/sampledb

    volumes:
      - .:/app